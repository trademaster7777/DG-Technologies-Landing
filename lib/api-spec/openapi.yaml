openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture operations
paths:
  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Capture a lead
      description: Stores contact info submitted before booking a strategy call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Time slot already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /leads/slots:
    get:
      operationId: getBookedSlots
      tags: [leads]
      summary: List booked time slots for a date
      description: Returns the time slots already claimed by other leads on the given date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Date to check (YYYY-MM-DD)
      responses:
        "200":
          description: Booked slots for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookedSlots"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /availability:
    get:
      operationId: getAvailability
      tags: [leads]
      summary: Weekly call availability
      description: Returns the bookable time slots for each day of the week
      responses:
        "200":
          description: Weekly availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Availability"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BookedSlots:
      type: object
      properties:
        bookedSlots:
          type: array
          items:
            type: string
      required:
        - bookedSlots
    ApiErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Availability:
      type: object
      description: Bookable slot start times (HH:MM) keyed by day of week
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DayAvailability"
      required:
        - days
    DayAvailability:
      type: object
      properties:
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: Day of week (0 = Sunday ... 6 = Saturday)
        slots:
          type: array
          items:
            type: string
            pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Bookable slot start times for this day, sorted ascending
      required:
        - dayOfWeek
        - slots
    LeadInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          pattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
          maxLength: 320
        phone:
          type: string
          minLength: 7
          maxLength: 40
        businessName:
          type: string
          maxLength: 200
        packageInterest:
          type: string
          enum: [launchpad, presence, not-sure]
        preferredTime:
          type: string
          enum: [morning, afternoon, evening]
          description: Optional best time of day for the callback
        preferredDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Optional preferred call date (YYYY-MM-DD); must not be in the past
        preferredSlot:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Optional preferred time slot (start of a 30-minute window); requires preferredDate and must fall within the configured availability
        message:
          type: string
          maxLength: 2000
        website:
          type: string
          maxLength: 200
          description: Honeypot field — must be left blank; non-empty submissions are discarded
      required:
        - name
        - email
        - phone
    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        businessName:
          type: ["string", "null"]
        packageInterest:
          type: ["string", "null"]
        preferredTime:
          type: ["string", "null"]
        preferredDate:
          type: ["string", "null"]
        preferredSlot:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - phone
        - businessName
        - packageInterest
        - preferredTime
        - preferredDate
        - preferredSlot
        - message
        - createdAt

