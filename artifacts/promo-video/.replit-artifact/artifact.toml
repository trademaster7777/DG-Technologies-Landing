kind = "video"
previewPath = "/promo-video/"
title = "D2G Promo Video"
version = "1.0.0"
id = "artifacts/promo-video"
router = "path"

[[services]]
name = "web"
paths = [ "/promo-video/" ]
localPort = 22228

[services.development]
run = "pnpm --filter @workspace/promo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promo-video", "run", "build" ]
serve = "static"
publicDir = "artifacts/promo-video/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22228"
BASE_PATH = "/promo-video/"
